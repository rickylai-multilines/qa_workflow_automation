{% extends "orders/base.html" %}

{% block title %}Preferences{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header">Dashboard Preferences</div>
    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label>
                <input type="checkbox" name="daily_email_enabled" {% if prefs.daily_email_enabled %}checked{% endif %}>
                Enable daily email summary
            </label>
        </div>
        <div class="form-group">
            <label for="daily_email_time">Daily email time</label>
            <input type="text" id="daily_email_time" name="daily_email_time" value="{{ prefs.daily_email_time }}">
        </div>
        <div class="form-group">
            <label>
                <input type="checkbox" name="send_warning_alerts" {% if prefs.send_warning_alerts %}checked{% endif %}>
                Send warning alerts
            </label>
        </div>
        <div class="form-group">
            <label>
                <input type="checkbox" name="send_critical_alerts" {% if prefs.send_critical_alerts %}checked{% endif %}>
                Send critical alerts
            </label>
        </div>
        <div class="form-group">
            <label>
                <input type="checkbox" name="show_completed_tasks" {% if prefs.show_completed_tasks %}checked{% endif %}>
                Show completed tasks
            </label>
        </div>
        <div class="form-group">
            <label for="default_view">Default view</label>
            <select id="default_view" name="default_view">
                <option value="my_tasks" {% if prefs.default_view == 'my_tasks' %}selected{% endif %}>My Tasks</option>
                <option value="all_orders" {% if prefs.default_view == 'all_orders' %}selected{% endif %}>All Orders</option>
                <option value="team" {% if prefs.default_view == 'team' %}selected{% endif %}>Team View</option>
            </select>
        </div>
        <button type="submit" class="btn btn-primary">Save Preferences</button>
    </form>
</div>
{% endblock %}
